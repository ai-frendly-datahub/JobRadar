category_name: "job"
display_name: "채용 레이더"

sources:
  - name: "사람인"
    type: "javascript"
    url: "https://www.saramin.co.kr/zf_user/jobs/list/job-category"
    config:
      wait_for: ".item_recruit"
      content_selector: ".item_recruit"
      title_selector: ".job_tit"
      link_selector: ".job_tit > a"

  - name: "잡코리아"
    type: "javascript"
    url: "https://www.jobkorea.co.kr/recruit/joblist"
    config:
      wait_for: ".list-post"
      content_selector: ".list-post"

  - name: "워크넷"
    type: "javascript"
    url: "https://www.work.go.kr/empInfo/empInfoSrch/list/dtlEmpSrchList.do"
    config:
      wait_for: ".list"

entities:
  - name: "Company"
    keywords:
      - "삼성"
      - "LG"
      - "네이버"
      - "카카오"
      - "쿠팡"
  - name: "JobTitle"
    keywords:
      - "개발자"
      - "디자이너"
      - "마케터"
      - "PM"
  - name: "TechStack"
    keywords:
      - "Python"
      - "Java"
      - "React"
      - "AWS"
