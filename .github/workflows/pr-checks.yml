name: JobRadar PR Checks
on:
  pull_request:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "radar-core @ git+https://github.com/ai-frendly-datahub/radar-core.git@v0.3.0"
          pip install -r requirements.txt
          pip install -e .
      - name: Tests
        run: pytest --tb=short
